<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATELLITE LIVE | منصة البث المباشر</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="background-overlay"></div>

    <header>
        <div class="logo">SATELLITE <span>LIVE</span></div>
        <p>بث مباشر من الأقمار الصناعية بجودة Ultra HD</p>
    </header>

    <div class="container">
        <div class="card" onclick="openStream('https://www.aljazeera.net/live')">
            <div class="card-badge">LIVE</div>
            <div class="card-icon"><i class="fas fa-broadcast-tower"></i></div>
            <div class="card-info">
                <h3>قناة الجزيرة</h3>
                <p>تغطية إخبارية على مدار الساعة</p>
            </div>
            <button class="watch-btn">شاهد الآن</button>
        </div>

        <div class="card" onclick="openStream('https://roya.tv/live-stream')">
            <div class="card-badge">LIVE</div>
            <div class="card-icon"><i class="fas fa-tv"></i></div>
            <div class="card-info">
                <h3>قناة رؤيا</h3>
                <p>الدراما والبرامج الأردنية</p>
            </div>
            <button class="watch-btn">شاهد الآن</button>
        </div>

        <div class="card" onclick="openStream('https://www.alarabiya.net/live-stream')">
            <div class="card-badge">LIVE</div>
            <div class="card-icon"><i class="fas fa-globe-americas"></i></div>
            <div class="card-info">
                <h3>قناة العربية</h3>
                <p>الحدث من كل الزوايا</p>
            </div>
            <button class="watch-btn">شاهد الآن</button>
        </div>
    </div>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeStream()">&times;</span>
            <iframe id="streamFrame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
