<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marwan TV Pro 🚀</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <div class="player-section">
            <video id="my-video" class="video-js vjs-fluid vjs-big-play-centered" controls preload="auto">
                <source src="https://live-hls-web-aje.akamaized.net/hls/live/2036571/aje/index.m3u8" type="application/x-mpegURL">
            </video>
            <div class="player-info">
                <h3 id="currentChannelName">جاري التحميل...</h3>
                <span class="live-badge">مباشر 🔴</span>
            </div>
        </div>

        <div class="list-section">
            <div class="list-header">
                <h3>قائمة القنوات 🔥</h3>
            </div>
            <div class="channels-grid" id="channelsList">
                </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
