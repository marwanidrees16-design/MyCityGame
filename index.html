<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق القنوات الإخبارية</title>
    <link rel="stylesheet" href="style.css">
</head>

    <div class="container" id="channels-container">

                <iframe src="https://www.youtube.com/embed/live_stream?channel=UCfiwzLy-8yKzIbsmZTzxDWA" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="card-content">
                <h3>قناة الجزيرة</h3>
                <span class="status">مباشر • إخبارية</span>
            </div>
        </div>

        <div class="card">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/live_stream?channel=UC7SlsidX03N_x_9XzS70R0A" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="card-content">
                <h3>قناة رؤيا</h3>
                <span class="status">مباشر • منوعات</span>
            </div>
        </div>

        <div class="card">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/live_stream?channel=UC65AfLxGZMyYmU66-WpS_mQ" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="card-content">
                <h3>قناة العربية</h3>
                <span class="status">مباشر • إخبارية</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
