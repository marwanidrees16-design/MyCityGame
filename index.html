<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marwan TV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
</head>
<body>
    <div class="player-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" width="640" height="264">
            <source src="رابط_القناة_هنا.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="channels-list">
        <button onclick="changeChannel('رابط_قناة_1.m3u8')">قناة الرياضة</button>
        <button onclick="changeChannel('رابط_قناة_2.m3u8')">قناة الأفلام</button>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var player = videojs('my-video');
        function changeChannel(url) {
            player.src({ type: 'application/x-mpegURL', src: url });
            player.play();
        }
    </script>
</body>
</html>
